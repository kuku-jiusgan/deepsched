version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: cro_scheduler
      MYSQL_USER: ${MYSQL_USER:-cro_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?请在 .env 中设置 MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: cro-server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?请在 .env 中设置 DATABASE_URL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?请在 .env 中设置 INITIAL_ADMIN_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    container_name: cro-web
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mysql_data:
