version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cro_scheduler
      MYSQL_USER: cro_user
      MYSQL_PASSWORD: cro_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: cro-server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://cro_user:cro_pass@mysql:3306/cro_scheduler
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    container_name: cro-web
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mysql_data: