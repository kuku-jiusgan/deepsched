worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
	server_names_hash_bucket_size 128;

    # --- 1. 活字格/OA系统 统一入口配置 (www.sduzbbri.online) ---
    server {
        listen       443 ssl;
        server_name  www.sduzbbri.online  oa.sduzbbri.online;

        # 证书配置
        ssl_certificate      sduzbbri.online.pem; 
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # ==========================================
        # 活字格主页面代理 (9090)
        # ==========================================
        location / {
            proxy_pass http://172.31.76.75:9090/;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            # 建议添加
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; 
            
            client_max_body_size 100M; 
        }
    }
server {
    listen 80;
    server_name www.sduzbbri.online 172.31.76.75; # 加上 IP 识别

    location / {
        proxy_pass http://172.31.76.75:9090; # 转发给活字格
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http; # 强制告诉后端这是明文
        
        # 针对大图渲染增加超时
        proxy_read_timeout 120s;
    }
}
    # --- 2. Dify 智能体专用入口 (ai.sduzbbri.online) ---
    server {
        listen       443 ssl;
        server_name  dify-ai-2026.sduzbbri.online; 

        ssl_certificate      sduzbbri.online.pem; 
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            proxy_pass http://10.0.0.111:80; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
            proxy_read_timeout 600s;
            client_max_body_size 50m;
        }
    }

    # --- 3. OpenClaw 专用入口 (claw.sduzbbri.online) ---
    server {
        listen       443 ssl;
        server_name  claw.sduzbbri.online; 

        ssl_certificate      sduzbbri.online.pem; 
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            proxy_pass http://10.0.0.199:18789; 

            proxy_buffering off;        
            proxy_cache off;            
            chunked_transfer_encoding on; 
            tcp_nopush on;
            tcp_nodelay on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
	# --- 4. PPT生成服务 (10.0.0.199:5888) ---
    server {
        listen       443 ssl;
        server_name  ppt-ai-2026.sduzbbri.online; # 请修改为你预想的子域名

        ssl_certificate      sduzbbri.online.pem; 
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            proxy_pass http://10.0.0.199:5888; 

            # 标准反代头信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 支持 WebSocket (根据 199 机器其他服务推测可能需要)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 增加超时兼容性
            proxy_read_timeout 300s;
        }
    }

    # --- 5. 新服务 B (10.0.0.199:5889) ---
    server {
        listen       443 ssl;
        server_name  qyyy-ai-2026.sduzbbri.online; # 请修改为你预想的子域名

        ssl_certificate      sduzbbri.online.pem; 
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            proxy_pass http://10.0.0.199:5889; 

            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }
    # --- 6. HR系统 (10.0.0.111:5888) ---
    server {
        listen       443 ssl;
        server_name  hr-ai-2026.sduzbbri.online;

        ssl_certificate      sduzbbri.online.pem;
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 310m;

        location / {
            proxy_pass http://10.0.0.111:5888;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 360s;
            proxy_send_timeout 360s;
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }

    server {
        listen      80;
        server_name hr-ai-2026.sduzbbri.online;
        return 301 https://$host$request_uri;
    }
    # --- 7. 排程系统 (10.0.0.111:5889) ---
    server {
        listen       443 ssl;
        server_name  deepsched.sduzbbri.online;

        ssl_certificate      sduzbbri.online.pem;
        ssl_certificate_key  sduzbbri.online.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 310m;

        location / {
            proxy_pass http://10.0.0.111:5889;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 360s;
            proxy_send_timeout 360s;
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }

    server {
        listen      80;
        server_name deepsched.sduzbbri.online;
        return 301 https://$host$request_uri;
    }

}
